<html lang="ko">

    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --border: #334155;
        --text: #e2e8f0;
        --muted: #94a3b8;
        --api: #3b82f6;
        --agent: #8b5cf6;
        --llm: #f59e0b;
        --rag: #10b981;
        --data: #06b6d4;
        --vision: #f43f5e;
        --voice: #a78bfa;
        --rl: #ec4899;
      }
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .top {
        position: sticky;
        top: 0;
        z-index: 10;
        background: var(--bg);
        border-bottom: 1px solid var(--border);
        padding: 8px 20px 6px;
        text-align: center;
      }
      .top h1 {
        font-size: 1.4em;
        background: linear-gradient(135deg, var(--data), var(--agent));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .top p {
        color: var(--muted);
        font-size: 0.75em;
      }
      .bar {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 5px;
        padding: 4px 10px 6px;
        flex-wrap: wrap;
        position: sticky;
        top: 46px;
        z-index: 10;
        background: var(--bg);
      }
      .lb {
        padding: 3px 9px;
        border-radius: 12px;
        border: 1.5px solid;
        font-size: 0.68em;
        font-weight: 600;
        cursor: pointer;
        background: transparent;
        transition: 0.12s;
      }
      .lb:hover,
      .lb.on {
        color: #fff !important;
      }
      .lb[data-t="api"] {
        color: var(--api);
        border-color: var(--api);
      }
      .lb[data-t="api"]:hover,
      .lb[data-t="api"].on {
        background: var(--api);
      }
      .lb[data-t="agent"] {
        color: var(--agent);
        border-color: var(--agent);
      }
      .lb[data-t="agent"]:hover,
      .lb[data-t="agent"].on {
        background: var(--agent);
      }
      .lb[data-t="llm"] {
        color: var(--llm);
        border-color: var(--llm);
      }
      .lb[data-t="llm"]:hover,
      .lb[data-t="llm"].on {
        background: var(--llm);
      }
      .lb[data-t="rag"] {
        color: var(--rag);
        border-color: var(--rag);
      }
      .lb[data-t="rag"]:hover,
      .lb[data-t="rag"].on {
        background: var(--rag);
      }
      .lb[data-t="data"] {
        color: var(--data);
        border-color: var(--data);
      }
      .lb[data-t="data"]:hover,
      .lb[data-t="data"].on {
        background: var(--data);
      }
      .lb[data-t="vision"] {
        color: var(--vision);
        border-color: var(--vision);
      }
      .lb[data-t="vision"]:hover,
      .lb[data-t="vision"].on {
        background: var(--vision);
      }
      .lb[data-t="voice"] {
        color: var(--voice);
        border-color: var(--voice);
      }
      .lb[data-t="voice"]:hover,
      .lb[data-t="voice"].on {
        background: var(--voice);
      }
      .lb[data-t="rl"] {
        color: var(--rl);
        border-color: var(--rl);
      }
      .lb[data-t="rl"]:hover,
      .lb[data-t="rl"].on {
        background: var(--rl);
      }
      .lb[data-t="all"] {
        color: var(--text);
        border-color: var(--border);
      }
      .lb[data-t="all"]:hover,
      .lb[data-t="all"].on {
        background: var(--border);
      }
      .sp {
        width: 1px;
        height: 16px;
        background: var(--border);
        margin: 0 3px;
      }
      .tb {
        padding: 3px 9px;
        border-radius: 12px;
        border: 1.5px solid var(--border);
        font-size: 0.68em;
        font-weight: 600;
        cursor: pointer;
        background: transparent;
        color: var(--text);
      }
      .tb:hover {
        background: var(--border);
      }
      #cv {
        width: 100%;
        overflow-x: auto;
        overflow-y: visible;
      }
      #cv svg {
        display: block;
      }
      .ft {
        position: fixed;
        bottom: 10px;
        right: 10px;
        display: flex;
        gap: 4px;
        z-index: 50;
      }
      .ft button {
        background: var(--card);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 5px 10px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.72em;
        font-weight: 600;
      }
      .ft button:hover {
        background: var(--border);
      }
      @media print {
        .ft,
        .bar,
        .top {
          display: none !important;
        }
        body {
          background: #fff;
          color: #333;
        }
      }
    </style>

      // ===== State =====
      const NM = {};
      nodes.forEach(
        (n) =>
          (NM[n[0]] = {
            id: n[0],
            label: n[1],
            sub: n[2],
            layer: n[3],
            col: n[4],
            fill: n[5],
            stroke: n[6],
            x: 0,
            y: 0,
            open: false,
          }),
      );
      const srC = {};
      nodes.forEach((n) => {
        const k = n[3];
        srC[k] = Math.max(srC[k] || 0, n[4] + 1);
      });
      const SR = [...new Set(nodes.map((n) => n[3]))].sort((a, b) => a - b);

      // Detail height — mirrors exact rendering logic (size+3 per line, DPAD top+bottom)
      function countLines(text, fontSize, bold) {
        const charW = fontSize * (bold ? 0.62 : 0.55);
        const maxChars = Math.floor((DW - DPAD * 2) / charW);
        if (text.length <= maxChars) return 1;
        let n = 0,
          rem = text;
        while (rem.length > maxChars) {
          let cut = rem.lastIndexOf(" ", maxChars);
          if (cut <= 0) cut = maxChars;
          n++;
          rem = rem.slice(cut).trimStart();
        }
        if (rem) n++;
        return n;
      }
      function lineH(fontSize) {
        return fontSize + 3;
      }
      function dH(id) {
        const d = D[id];
        if (!d) return 0;
        let h = DPAD; // top pad
        h += countLines(d.n, DFONT + 1, true) * lineH(DFONT + 1);
        if (d.r) h += countLines(d.r, DFONT - 1, false) * lineH(DFONT - 1);
        h += countLines(d.p, DFONT - 1.5, false) * lineH(DFONT - 1.5);
        d.d.forEach((l) => {
          h += countLines(l, DFONT, false) * lineH(DFONT);
        });
        if (d.g)
          h += countLines("+ " + d.g, DFONT - 0.5, false) * lineH(DFONT - 0.5);
        if (d.b && d.b !== "-")
          h += countLines("- " + d.b, DFONT - 0.5, false) * lineH(DFONT - 0.5);
        if (d.w)
          h += countLines("! " + d.w, DFONT - 0.5, false) * lineH(DFONT - 0.5);
        h += DPAD; // bottom pad
        return h;
      }

      // Column width: always NW-based (detail panels overflow independently below)
      function layout() {
        const CW = NW + HGAP;
        const maxCol = Math.max(...Object.values(srC));
        const TW = Math.max(maxCol * CW + M * 2, 1200);
        let cy = M;
        const sY = {},
          lY = {},
          lH = {};
        let ll = -1;
        SR.forEach((sr) => {
          const lr = Math.floor(sr);
          if (lr !== ll) {
            cy += LTH;
            ll = lr;
            lY[lr] = cy - LTH + 4;
          }
          sY[sr] = cy;
          cy += NH + 4;
          // max detail height in this subrow
          let maxDH = 0;
          nodes
            .filter((n) => n[3] === sr)
            .forEach((n) => {
              if (NM[n[0]].open) maxDH = Math.max(maxDH, dH(n[0]));
            });
          if (maxDH > 0) cy += maxDH + 8;
          cy += VGAP - NH;
        });
        for (let l = 0; l < 6; l++) {
          const srs = SR.filter((s) => Math.floor(s) === l);
          if (!srs.length) continue;
          const top = lY[l];
          let bot = 0;
          srs.forEach((sr) => {
            let b = sY[sr] + NH + 24;
            let mx = 0;
            nodes
              .filter((n) => n[3] === sr)
              .forEach((n) => {
                if (NM[n[0]].open) mx = Math.max(mx, dH(n[0]));
              });
            b += mx;
            bot = Math.max(bot, b);
          });
          lH[l] = bot - top;
        }
        nodes.forEach((n) => {
          const nd = NM[n[0]],
            cols = srC[n[3]];
          const startX = M + (TW - M * 2 - cols * CW) / 2;
          nd.x = startX + n[4] * CW;
          nd.y = sY[n[3]];
        });
        return { H: cy + M, lY, lH, TW, CW };
      }

      const S = "http://www.w3.org/2000/svg";
      function el(t, a) {
        const e = document.createElementNS(S, t);
        for (const [k, v] of Object.entries(a || {}))
          e.setAttribute(k, String(v));
        return e;
      }
      const cv = document.getElementById("cv");
      let sc = 1,
        filt = "all";

      function draw() {
        const L = layout();
        cv.innerHTML = "";
        const svg = el("svg", { viewBox: `0 0 ${L.TW} ${L.H}`, xmlns: S });
        svg.style.width = L.TW * sc + "px";
        svg.style.minWidth = "1000px";

        const defs = el("defs");
        Object.entries(C).forEach(([k, c]) => {
          const m = el("marker", {
            id: "m_" + k,
            markerWidth: 8,
            markerHeight: 6,
            refX: 8,
            refY: 3,
            orient: "auto",
          });
          m.appendChild(el("polygon", { points: "0 0,8 3,0 6", fill: c }));
          defs.appendChild(m);
        });
        svg.appendChild(defs);

        // Layer BG + title
        for (let l = 0; l < 6; l++) {
          if (!L.lH[l]) continue;
          svg.appendChild(
            el("rect", {
              x: 0,
              y: L.lY[l],
              width: L.TW,
              height: L.lH[l],
              fill: LC[l],
              opacity: 0.05,
              rx: 8,
            }),
          );
          const t = el("text", {
            x: M,
            y: L.lY[l] + 18,
            fill: LC[l],
            "font-size": 12,
            "font-weight": 700,
            opacity: 0.7,
          });
          t.textContent = LN[l];
          svg.appendChild(t);
        }

        // Occupied rects for label avoidance (nodes + detail panels + layer titles)
        const occ = [];
        // Layer title bars
        for (let l = 0; l < 6; l++) {
          if (L.lY[l] !== undefined) {
            occ.push({ x: 0, y: L.lY[l], w: L.TW, h: LTH });
          }
        }
        // Node boxes + open detail panels
        nodes.forEach((n) => {
          const nd = NM[n[0]];
          occ.push({ x: nd.x - 4, y: nd.y - 4, w: NW + 8, h: NH + 8 });
          if (nd.open) {
            const h = dH(n[0]);
            occ.push({ x: nd.x - 4, y: nd.y + NH, w: DW + 8, h: h + 8 });
          }
        });
        function ov(a, b) {
          return (
            a.x < b.x + b.w &&
            a.x + a.w > b.x &&
            a.y < b.y + b.h &&
            a.y + a.h > b.y
          );
        }

        // Edges
        const eG = el("g"),
          lG = el("g");
        const used = [];
        edges.forEach((e) => {
          const a = NM[e[0]],
            b = NM[e[1]];
          if (!a || !b) return;
          const aBot = a.open ? a.y + NH + dH(e[0]) : a.y + NH;
          const bBot = b.open ? b.y + NH + dH(e[1]) : b.y + NH;
          let sx = a.x + NW / 2,
            sy,
            ex = b.x + NW / 2,
            ey;
          const dy = b.y + NH / 2 - (a.y + NH / 2),
            dx = ex - sx;
          if (Math.abs(dy) >= Math.abs(dx)) {
            sy = dy > 0 ? aBot : a.y;
            ey = dy > 0 ? b.y : bBot;
          } else {
            sy = a.y + NH / 2;
            ey = b.y + NH / 2;
            if (dx > 0) {
              sx = a.x + NW;
              ex = b.x;
            } else {
              sx = a.x;
              ex = b.x + NW;
            }
          }
          let c1x, c1y, c2x, c2y;
          const ddx = ex - sx,
            ddy = ey - sy;
          if (Math.abs(ddy) >= Math.abs(ddx)) {
            c1x = sx;
            c1y = sy + ddy * 0.4;
            c2x = ex;
            c2y = ey - ddy * 0.4;
          } else {
            c1x = sx + ddx * 0.4;
            c1y = sy;
            c2x = ex - ddx * 0.4;
            c2y = ey;
          }
          const p = el("path", {
            d: `M${sx} ${sy} C${c1x} ${c1y},${c2x} ${c2y},${ex} ${ey}`,
            stroke: C[e[2]],
            "stroke-width": e[4] ? 1 : 1.3,
            fill: "none",
            "marker-end": `url(#m_${e[2]})`,
            opacity: e[4] ? 0.3 : 0.45,
            class: "cn",
            "data-t": e[2],
            "data-f": e[0],
            "data-to": e[1],
          });
          if (e[4]) p.setAttribute("stroke-dasharray", "7,4");
          eG.appendChild(p);
          if (!e[3]) return;
          const mx = (sx + c1x + c2x + ex) / 4,
            my = (sy + c1y + c2y + ey) / 4;
          const tw = e[3].length * 5.2 + 10,
            th = 14;
          let lx = mx - tw / 2,
            ly = my - th / 2;
          // Collision avoidance: try down, then up, then right/left shifts
          let placed = false;
          for (let dir = 0; dir < 6 && !placed; dir++) {
            for (let step = 0; step < 15 && !placed; step++) {
              let tx = lx, ty = ly;
              if (dir === 0) ty = my - th / 2 + step * (th + 2);       // down
              else if (dir === 1) ty = my - th / 2 - step * (th + 2);  // up
              else if (dir === 2) { tx = mx - tw / 2 + 30; ty = my - th / 2 + step * (th + 2); }  // right+down
              else if (dir === 3) { tx = mx - tw / 2 - 30; ty = my - th / 2 + step * (th + 2); }  // left+down
              else if (dir === 4) { tx = mx - tw / 2 + 60; ty = my - th / 2 + step * (th + 2); }
              else { tx = mx - tw / 2 - 60; ty = my - th / 2 + step * (th + 2); }
              if (![...used, ...occ].some((o) => ov({ x: tx, y: ty, w: tw, h: th }, o))) {
                lx = tx; ly = ty; placed = true;
              }
            }
          }
          used.push({ x: lx, y: ly, w: tw, h: th });
          lG.appendChild(
            el("rect", {
              x: lx - 2,
              y: ly - 1,
              width: tw + 4,
              height: th + 2,
              fill: "#0f172a",
              opacity: 0.9,
              rx: 3,
              class: "cl",
              "data-t": e[2],
              "data-f": e[0],
              "data-to": e[1],
            }),
          );
          const txt = el("text", {
            x: lx + tw / 2,
            y: ly + 10.5,
            fill: C[e[2]],
            "font-size": 8.5,
            "font-weight": 600,
            "text-anchor": "middle",
            opacity: 0.9,
            class: "cl",
            "data-t": e[2],
            "data-f": e[0],
            "data-to": e[1],
          });
          txt.textContent = e[3];
          lG.appendChild(txt);
        });
        svg.appendChild(eG);
        svg.appendChild(lG);

        // Nodes + detail panels
        const nG = el("g");
        nodes.forEach((n) => {
          const nd = NM[n[0]],
            d = D[n[0]];
          const g = el("g", {
            "data-id": n[0],
            style: "cursor:pointer",
            class: "nb",
          });
          // Node box
          g.appendChild(
            el("rect", {
              x: nd.x,
              y: nd.y,
              width: NW,
              height: NH,
              rx: 10,
              fill: nd.fill,
              stroke: nd.stroke,
              "stroke-width": nd.open ? 2.8 : 1.8,
            }),
          );
          const t1 = el("text", {
            x: nd.x + NW / 2,
            y: nd.y + 24,
            fill: "#fff",
            "text-anchor": "middle",
            "font-size": 12,
            "font-weight": 700,
          });
          t1.textContent = nd.label;
          g.appendChild(t1);
          const t2 = el("text", {
            x: nd.x + NW / 2,
            y: nd.y + 43,
            fill: nd.stroke,
            "text-anchor": "middle",
            "font-size": 10,
            opacity: 0.85,
          });
          t2.textContent = nd.sub;
          g.appendChild(t2);
          const ind = el("text", {
            x: nd.x + NW - 8,
            y: nd.y + 13,
            fill: nd.stroke,
            "font-size": 9,
            opacity: 0.5,
            "text-anchor": "middle",
          });
          ind.textContent = nd.open ? "\u25B2" : "\u25BC";
          g.appendChild(ind);

          // Detail panel — same width as node, perfectly aligned below
          if (nd.open && d) {
            let px = nd.x;
            const py = nd.y + NH + 2;
            let ty = py + DPAD;
            const textEls = [];
            const maxTextW = DW - DPAD * 2;
            let maxLineW = 0; // track widest line for tight-fit width
            const add = (text, size, color, bold) => {
              const charW = size * (bold ? 0.62 : 0.55);
              const maxChars = Math.floor(maxTextW / charW);
              const lines = [];
              let rem = text;
              while (rem.length > maxChars) {
                let cut = rem.lastIndexOf(" ", maxChars);
                if (cut <= 0) cut = maxChars;
                lines.push(rem.slice(0, cut));
                rem = rem.slice(cut).trimStart();
              }
              if (rem) lines.push(rem);
              lines.forEach((line) => {
                const w = line.length * charW;
                if (w > maxLineW) maxLineW = w;
                textEls.push({
                  x: px + DPAD,
                  y: ty + size * 0.85,
                  fill: color,
                  size,
                  bold,
                  text: line,
                });
                ty += size + 3;
              });
            };
            add(d.n, DFONT + 1, "#fff", true);
            if (d.r) add(d.r, DFONT - 1, "#94a3b8", false);
            add(d.p, DFONT - 1.5, "#06b6d4", false);
            d.d.forEach((l) => add(l, DFONT, "#e2e8f0", false));
            if (d.g) add("+ " + d.g, DFONT - 0.5, "#6ee7b7", false);
            if (d.b && d.b !== "-")
              add("- " + d.b, DFONT - 0.5, "#fca5a5", false);
            if (d.w) add("! " + d.w, DFONT - 0.5, "#fcd34d", false);
            // Exact dimensions: fit to content
            const realH = ty - py + DPAD;
            const realW = Math.min(DW, Math.max(NW, maxLineW + DPAD * 2));
            g.appendChild(
              el("rect", {
                x: px,
                y: py,
                width: realW,
                height: realH,
                rx: 8,
                fill: "#0f172af5",
                stroke: nd.stroke,
                "stroke-width": 1,
              }),
            );
            textEls.forEach((t) => {
              const ln = el("text", {
                x: t.x,
                y: t.y,
                fill: t.fill,
                "font-size": t.size,
                "font-weight": t.bold ? 700 : 400,
              });
              ln.textContent = t.text;
              g.appendChild(ln);
            });
          }
          nG.appendChild(g);
        });
        svg.appendChild(nG);
        cv.appendChild(svg);

        // Interactions
        svg.querySelectorAll(".nb").forEach((g) => {
          g.addEventListener("click", (ev) => {
            ev.stopPropagation();
            const id = g.dataset.id;
            NM[id].open = !NM[id].open;
            draw();
          });
          g.addEventListener("mouseenter", () => {
            const id = g.dataset.id;
            svg.querySelectorAll(".cn").forEach((c) => {
              const on = c.dataset.f === id || c.dataset.to === id;
              c.style.opacity = on ? "1" : "0.04";
              if (on) c.style.strokeWidth = "2.5";
            });
            svg.querySelectorAll(".cl").forEach((c) => {
              const on = c.dataset.f === id || c.dataset.to === id;
              c.style.opacity = on ? "1" : "0.04";
            });
            svg.querySelectorAll(".nb").forEach((n) => {
              if (n === g) return;
              const nid = n.dataset.id;
              n.style.opacity = edges.some(
                (e) =>
                  (e[0] === id && e[1] === nid) ||
                  (e[1] === id && e[0] === nid),
              )
                ? "1"
                : "0.12";
            });
          });
          g.addEventListener("mouseleave", () => af());
        });
      }

      function af() {
        const svg = cv.querySelector("svg");
        if (!svg) return;
        svg.querySelectorAll(".cn").forEach((c) => {
          const on = filt === "all" || c.dataset.t === filt;
          c.style.opacity = on
            ? c.getAttribute("stroke-dasharray")
              ? 0.3
              : 0.45
            : "0.03";
          c.style.strokeWidth = on ? "1.3" : "1";
        });
        svg.querySelectorAll(".cl").forEach((c) => {
          c.style.opacity =
            filt === "all" || c.dataset.t === filt ? ".9" : "0.03";
        });
        svg.querySelectorAll(".nb").forEach((n) => (n.style.opacity = "1"));
      }
      document.querySelectorAll(".lb").forEach((b) => {
        b.addEventListener("click", () => {
          document
            .querySelectorAll(".lb")
            .forEach((x) => x.classList.remove("on"));
          b.classList.add("on");
          filt = b.dataset.t;
          af();
        });
      });
      document.getElementById("bE").onclick = () => {
        nodes.forEach((n) => (NM[n[0]].open = true));
        draw();
      };
      document.getElementById("bC").onclick = () => {
        nodes.forEach((n) => (NM[n[0]].open = false));
        draw();
      };
      function zm(s) {
        sc = Math.max(0.25, Math.min(3, s));
        const svg = cv.querySelector("svg");
        if (svg) {
          const L = layout();
          svg.style.width = L.TW * sc + "px";
        }
      }
      cv.addEventListener(
        "wheel",
        (e) => {
          if (e.ctrlKey || e.metaKey) {
            e.preventDefault();
            zm(sc * (e.deltaY < 0 ? 1.08 : 1 / 1.08));
          }
        },
        { passive: false },
      );
      draw();
    </script>
  </body>
</html>
