version: "3.9"

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
    volumes:
      - chroma-data:/data/chroma
    depends_on:
      chromadb:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  chromadb:
    image: chromadb/chroma:latest
    # 포트 노출 안 함 — Docker 내부 네트워크에서만 접근 (보안)
    volumes:
      - chroma-data:/chroma/chroma

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  chroma-data:
